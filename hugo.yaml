baseURL: "https://alondraescobar.github.io"
languageCode: "en-us"
title: "Alondra Escobar"
theme: hugo-profile

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

pagination:
  pagerSize: 3

markup:
  goldmark:
    renderer:
      unsafe: true


Menus:
  main:
    - identifier: blog
      name: Notes
      title: Notes
      url: /blogs
      weight: 1
    - identifier: gallery
      name: Wet Lab
      title: Wet Lab Gallery
      url: /gallery
      weight: 2

params:
  title: "Alondra Escobar"
  description: "Neuroscientist | Microscopist | Instrument Builder"
  # staticPath: ""  # The path to serve the static files from
  favicon: "/fav.png"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Uncomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether to add mathjax support on all pages. Alternatively, you can opt-in per page by adding `mathjax: true` in the frontmatter.
  mathjax: false

  # Whether the fade animations on the home page will be enabled
  animate: true

  theme:
    # disableThemeToggle: true
    # defaultTheme: "light" # dark

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # When using hex codes for colors, quotations must be used along with the # sign
  # color:
  #   textColor: "#343a40"
  #   secondaryTextColor: "#6c757d"
  #   textLinkColor: "#007bff"
  #   backgroundColor: "#eaedf0"
  #   secondaryBackgroundColor: "#64ffda1a"
  #   primaryColor: "#007bff"
  #   secondaryColor: "#f8f9fa"

  #   darkmode:
  #     textColor: "#e4e6eb"
  #     secondaryTextColor: "#b0b3b8"
  #     textLinkColor: "#ffffff"
  #     backgroundColor: "#18191a"
  #     secondaryBackgroundColor: "#212529"
  #     primaryColor: "#ffffff"
  #     secondaryColor: "#212529"

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    # brandLogo: "/logo.png" # Logo for the brand | default is the favicon variable
    showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "Alondra Escobar" # Brand name for the brand | default is the title variable
    disableSearch: true
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: true
      disableEducation: false
      disableProjects: false
      disableAchievements: true
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "I'm"
    title: "Alondra Escobar"
    subtitle: "I build tools to understand our brain 🧠"
    content: "Neuroscientist · Microscopist · Bioinformatics · Brain Computer Interfaces"
    image: /images/hero.jpg
    bottomImage:
      enable: true
    roundImage: true # Make hero image circular | default false
    button:
      enable: false
      name: "Resume"
      url: "#"
      download: true
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/alondraeu
        - icon: fab fa-linkedin
          url: https://www.linkedin.com/in/alondraescobar


  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/me.png"
    content: |-
      I'm an interdisciplinary scientist with experience building experimental and computational platforms spanning advanced microscopy, neurogenetics, and genomic data analysis.
    skills:
      enable: true
      title: "Skills and tools i use:"
      items:
        - "Calcium imaging"
        - "In vivo rodent experiments"
        - "CRISPR-based genome editing"
        - "Confocal, Light-sheet, and Super-resolution STORM microscopy"
        - "Primary Neuron culture"
        - "Neuron transfection"
        - "Immunofluorescence (histology & cytology)"
        - "RNAseq"
        - "CUT&RUNseq"
        - "MethylSeq"
        - "ATATseq"
        - "Viral vectors"
        - "Optogenetics"

  # Experience
  experience:
    enable: false
    # title: "Custom Name"
    items:
      - company: "Facebook"
        companyUrl: "https://example.com"
        jobs:
          - name: "Senior Software Developer"
            date: "Jan 2023 - present"
            content: "I am currently working as a senior software developer at [example org.](https://example.com) in San Francisco, CA. I am currently working on a project that will be used to help people find the best way to get around the city."
            info:
              content: Working as a senior software developer
            featuredItems:
              fontAwesomeIcons:
                - icon: fa-brands fa-react
                  url: https://react.dev/
                  tooltip: Example tooltip content
                - icon: fab fa-x-twitter
                  url: https://example.com
                  # tooltip: Example tooltip content
              customIcons:
                - icon: /fav.png
                  url: "https://example.com"
                  tooltip: Example tooltip content
          - name: "Software Developer"
            date: "Jan 2022 - Dec 2023"
            content: "I worked as a software developer. I worked on a project that will be used to help people find the best way to get around the city."

  # Education
  education:
    enable: true
    # title: "Custom Name"
    index: false
    items:
      - title: "Ph.D. Bioengineering"
        school:
          name: "Rice University"
          logo: /images/rice_logo.jpg
        content: |-
          I study mammalian brain development and neurodegenerative conditions.     
        

  # Achievements - disabled
 
  # projects
  projects:
    enable: true
    # title: "Custom Name"
    items:
      - title: "NGS analysis platform"
        content: "Automated genomic workflows (RNAseq, CUT&RUN, MethylSeq, ATACseq)"
        image: /images/projects/profile.png
        badges:
          - "Python"
          - "R"
          - "API"
          - "GUI"
          - "RNAseq"
          - "ATACseq"
        links:
          - icon: fab fa-github
            url: https://github.com/alondraeu

      - title: "Neuron Tracking Pipeline"
        content: "Automated pipeline for single-cell neuron tracking"
        image: /images/projects/converter.jpg
        badges:
          - "Python"
          - "Image Analysis"
          - "AI"
          - "Cell Tracking"
        links:
          - icon: fab fa-github
            url: https://github.com/alondraeu

  #Contact
  contact:
    enable: true
    title: "Contact"
    content: "Want to connect? Reach out to me on LinkedIn — I'd love to hear from you!"
    btnName: "Connect on LinkedIn"
    btnLink: https://www.linkedin.com/in/alondraescobar
    # formspree:
    #   enable: true # `contact.email` value will be ignored
    #   formId: abcdefgh # Take it from your form's endpoint, like 'https://formspree.io/f/abcdefgh'
    #   emailCaption: "Enter your email address"
    #   messageCaption: "Enter your message here"
    #   messageRows: 5

  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: Recent Posts
      enable: true
      disableFeaturedImage: true
    socialNetworks:
      github: https://github.com/alondraeu
      linkedin: https://www.linkedin.com/in/alondraescobar
      twitter: https://twitter.com/alondraeu


  # List pages like blogs and posts
  listPages:
    disableFeaturedImage: false

  # Single pages like blog and post
  singlePages:
    socialShare: false
    readTime:
      enable: true
      content: "min read"
    scrollprogress:
      enable: true
    tags:
      openInNewTab: true

  # For translations
  terms:
    read: "Read"
    toc: "Table Of Contents"
    copyright: "All rights reserved"
    pageNotFound: "Page not found"
    emailText: "Check out this site"

  datesFormat:
    article: "Jan 2, 2006"
    articleList: "Jan 2, 2006"
    articleRecent: "Jan 2, 2006"

  #customScripts: -| # You can add custom scripts which will be added before </body> tag
  #  <script type="text/javascript"><!-- any script here --></script>
